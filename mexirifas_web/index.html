
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mexirifas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>MEXIRIFAS</h1>
<p>Premios reales • Ganadores reales</p>
</header>

<section class="hero">
<h2>🎁 Rifa Activa</h2>
<img src="premio.jpg" class="premio" alt="Premio">

<p>Premio: iPhone 15</p>
<p>Números del 00 al 99</p>
<p>$100 MXN por número</p>

<button onclick="mostrarNumeros()">Elegir Número</button>
</section>

<section id="numeros" class="numeros"></section>

<section class="formulario">
<h2>Participar</h2>
<form>
<input placeholder="Nombre" required>
<input placeholder="WhatsApp" required>
<input placeholder="Número elegido" required>
<button type="submit">Enviar</button>
</form>
</section>

<section class="ganadores">
<h2>🏆 Ganadores</h2>
<p>Aquí se publicarán los ganadores con evidencia del sorteo.</p>
</section>

<footer>
<p>Contacto WhatsApp</p>
<p>© Mexirifas</p>
</footer>

<script src="script.js"></script>
</body>
</html>
